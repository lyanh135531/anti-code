name: Daily YouTube Shorts

on:
  schedule:
    # Chạy lúc 06:45 UTC mỗi ngày (tương đương 13:45 chiều GMT+7)
    - cron: "45 6 * * *"
  workflow_dispatch:
    # Cho phép chạy thủ công từ tab Actions
    inputs:
      dry_run:
        description: "Dry Run (Không upload)"
        required: false
        default: "false"
        type: boolean

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./youtube-auto

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Thêm các biến khác nếu cần
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload Logs (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
