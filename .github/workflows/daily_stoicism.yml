name: Daily Stoicism Shorts

# Đảm bảo chỉ có 1 job được chạy tại cùng 1 thời điểm
concurrency:
  group: youtube-stoicism-pipeline
  cancel-in-progress: false

on:
  schedule:
    # Chạy lúc 08:00 UTC mỗi ngày (tương đương 15:00 chiều GMT+7 Việt Nam)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Cho phép chạy thủ công từ tab Actions
    inputs:
      dry_run:
        description: "Dry Run (Không upload)"
        required: false
        default: "false"
        type: boolean

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./youtube-stoicism

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create or Update youtube_token.pickle from Secret
        if: env.YOUTUBE_TOKEN_BASE64 != ''
        env:
          YOUTUBE_TOKEN_BASE64: ${{ secrets.STOICISM_YOUTUBE_TOKEN_BASE64 }}
        run: |
          echo "$YOUTUBE_TOKEN_BASE64" | base64 --decode > youtube_token.pickle
          
      - name: Create client_secrets.json from Secret
        if: env.CLIENT_SECRETS_BASE64 != ''
        env:
          CLIENT_SECRETS_BASE64: ${{ secrets.STOICISM_CLIENT_SECRETS_BASE64 }}
        run: |
          echo "$CLIENT_SECRETS_BASE64" | base64 --decode > client_secrets.json

      - name: Run Pipeline
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .topic_history.txt || true
          # Chỉ commit nếu có sự thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update stoicism topic history" && git push)

      - name: Upload Output (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stoicism-video-and-logs
          path: |
            youtube-stoicism/logs/
            youtube-stoicism/output/shorts/
          retention-days: 3
